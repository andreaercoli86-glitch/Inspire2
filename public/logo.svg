<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Outer ring gradients -->
    <linearGradient id="ringLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ringRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- Star point gradients -->
    <linearGradient id="gN" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gNE" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="gE" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gSE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gS" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="gSW" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="gW" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gNW" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Center glow -->
    <radialGradient id="centerGlow">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- Outer ring arcs -->
  <path d="M60 12 A48 48 0 0 1 108 60" fill="none" stroke="url(#ringLeft)" stroke-width="2.5" opacity="0.5"/>
  <path d="M108 60 A48 48 0 0 1 60 108" fill="none" stroke="url(#ringRight)" stroke-width="2.5" opacity="0.5"/>
  <path d="M60 108 A48 48 0 0 1 12 60" fill="none" stroke="url(#ringRight)" stroke-width="2.5" opacity="0.4"/>
  <path d="M12 60 A48 48 0 0 1 60 12" fill="none" stroke="url(#ringLeft)" stroke-width="2.5" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="url(#ringLeft)" stroke-width="1.5" opacity="0.25"/>

  <!-- 8-point compass star -->
  <!-- N (up) -->
  <polygon points="60,14 54,50 60,44 66,50" fill="url(#gN)"/>
  <!-- NE -->
  <polygon points="93,27 67,53 64,48 70,45" fill="url(#gNE)"/>
  <!-- E (right) -->
  <polygon points="106,60 70,54 76,60 70,66" fill="url(#gE)"/>
  <!-- SE -->
  <polygon points="93,93 67,67 70,64 73,70" fill="url(#gSE)"/>
  <!-- S (down) -->
  <polygon points="60,106 66,70 60,76 54,70" fill="url(#gS)"/>
  <!-- SW -->
  <polygon points="27,93 53,67 56,70 50,73" fill="url(#gSW)"/>
  <!-- W (left) -->
  <polygon points="14,60 50,66 44,60 50,54" fill="url(#gW)"/>
  <!-- NW -->
  <polygon points="27,27 53,53 50,56 45,50" fill="url(#gNW)"/>

  <!-- Center gem -->
  <circle cx="60" cy="60" r="7" fill="url(#centerGlow)"/>
  <circle cx="60" cy="60" r="4" fill="#fef3c7" opacity="0.9"/>

  <!-- Sparkles -->
  <g fill="#f59e0b" opacity="0.7">
    <polygon points="98,22 99,25 102,25 100,27 101,30 98,28 95,30 96,27 94,25 97,25" transform="scale(0.6) translate(60,-10)"/>
    <polygon points="20,95 21,98 24,98 22,100 23,103 20,101 17,103 18,100 16,98 19,98" transform="scale(0.5) translate(-5,40)"/>
  </g>
  <circle cx="100" cy="24" r="1.2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="96" cy="18" r="0.8" fill="#fbbf24" opacity="0.5"/>
  <circle cx="20" cy="98" r="1" fill="#f59e0b" opacity="0.5"/>
  <circle cx="24" cy="102" r="0.7" fill="#fbbf24" opacity="0.4"/>
</svg>
